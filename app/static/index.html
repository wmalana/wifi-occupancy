<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WiFi Occupancy Tracker</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>WiFi Occupancy Tracker</h1>
    <span id="last-updated">Loading…</span>
  </header>

  <main>
    <div class="controls">
      <label for="site-filter">Filter site:</label>
      <select id="site-filter">
        <option value="">All sites</option>
      </select>

      <label for="days-select">Trend window:</label>
      <select id="days-select">
        <option value="7">Last 7 days</option>
        <option value="14">Last 14 days</option>
        <option value="30" selected>Last 30 days</option>
      </select>
    </div>

    <div id="cards"><p class="loading">Loading current counts…</p></div>

    <div id="table-section">
      <h2>Daily peak client counts</h2>
      <div class="table-legend" id="table-legend"></div>
      <div id="data-table-wrap"></div>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
