# Runs the test suite automatically on every push and pull request.
# GitHub spins up a fresh Linux machine, installs Python + our deps, and runs pytest.
# If the tests fail, the PR is marked failed and (with branch protection) can't be merged.
name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. Grab the repository code onto the runner.
      - uses: actions/checkout@v4

      # 2. Install Python 3.12 (matches the version in our Dockerfile).
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # 3. Install app + test dependencies.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # 4. Run the test suite.
      - name: Run pytest
        run: python -m pytest tests/ -v
